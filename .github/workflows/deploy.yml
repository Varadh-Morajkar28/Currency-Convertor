name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Upload Website Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy Live
        uses: actions/deploy-pages@v4
